<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Word Wave</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>

<!-- Start screen -->
<div id="start-screen">
  <div class="start-inner">
    <div class="logo">Word Wave</div>
    <div style="line-height:1"><span class="wave-icon"></span></div>
    <p class="tagline loading" id="tagline"><span class="dot"></span><span class="dot"></span><span class="dot"></span></p>
    <button class="btn-primary" id="btn-start">学習開始</button>
    <button class="btn-secondary" id="btn-start-reset" style="width:100%">リセットして再開</button>
  </div>
</div>

<!-- Heatmap section (always visible) -->
<div id="heatmap-section">
  <div id="toast"></div>
  <div id="heatmap-stats">
    <span>学習済み <span class="val" id="stat-learned">0</span>語</span>
    <span>定着 <span class="val" id="stat-mastered">0</span>語</span>
    <span>Wave <span class="val" id="stat-waves">1</span></span>
    <span>Day <span class="val" id="stat-day">0.0</span></span>
    <span id="heatmap-ww-link"><span class="wave-icon"></span> waves ›</span>
  </div>
  <canvas id="heatmap-canvas"></canvas>
</div>

<!-- Main app -->
<div id="app" style="display:flex">

  <!-- Card area -->
  <div id="card-area" style="display:none">
    <div id="card-wrapper">
      <!-- Cards injected here -->
      <!-- PC用ナビボタン: タッチ非対応環境でのみ表示 -->
      <div id="pc-nav-btns" hidden>
        <button id="btn-prev-card" title="前のカード">↑</button>
        <button id="btn-next-card" title="次のカード">↓</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer" style="display:none">
    <div class="footer-item">
      <span class="val" id="footer-card-idx">0</span>/<span class="val" id="footer-card-total">0</span>
    </div>
    <div id="progress-bar-container">
      <div id="progress-bar-fill"></div>
    </div>
    <div class="footer-item">
      正解 <span class="val" id="footer-correct">0</span>
      &nbsp;/&nbsp;
      誤答 <span class="val" id="footer-wrong">0</span>
    </div>
  </div>

</div>

<!-- Word Wave full screen overlay -->
<div id="wordwave-overlay" style="display:none">
  <div id="wordwave-header">
    <div id="wordwave-header-left">
      <div id="wordwave-title">Word Wave <span id="wordwave-wave"></span><span id="wordwave-time"></span></div>
      <div id="wordwave-stats"></div>
    </div>
    <div id="wordwave-header-actions">
      <button id="wordwave-close">✕</button>
    </div>
  </div>
  <!-- 一括除外モード時のヘッダ（通常は非表示） -->
  <div id="wordwave-bulk-bar" style="display:none">
    <span id="ww-bulk-count">0語を選択中</span>
    <div id="ww-bulk-actions">
      <button id="ww-bulk-ok">除外する</button>
      <button id="ww-bulk-cancel">キャンセル</button>
    </div>
  </div>
  <div id="wordwave-body"></div>
  <!-- 学習プロファイルを開く FAB（海図アイコン）。Tide フッタの上に浮かせる（位置A）。gating で表示制御 -->
  <button id="ww-profile-fab" style="display:none" title="学習プロファイル">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
      <line x1="8" y1="2" x2="8" y2="18"/>
      <line x1="16" y1="6" x2="16" y2="22"/>
    </svg>
  </button>
  <div id="ww-pace-section"></div>
  <div id="wordwave-footer">
    <span class="ww-zoom-label">ズーム</span>
    <input type="range" min="6" max="24" value="6" id="zoom-slider">
    <button id="ww-bulk-btn">🗑️</button>
  </div>
  <!-- 単語タップ時のポップオーバー -->
  <div id="word-popover" style="display:none"></div>
</div>

<!-- Marine Chart 学習プロファイル overlay（Word Wave の FAB から開く） -->
<div id="profile-overlay" style="display:none">
  <div id="profile-header">
    <span class="pf-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
      </svg>
    </span>
    <h1>Marine Chart 学習プロファイル</h1>
    <span class="pf-close" id="profile-close" title="閉じる">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </span>
  </div>
  <div id="profile-body"><div class="pf-wrap" id="profile-body-inner"></div></div>
</div>

<!-- 綴りの暗礁 特訓ドリル overlay（練習モード・SRS には影響しない） -->
<div id="drill-overlay" style="display:none">
  <div id="drill-header">
    <h1>綴りの暗礁 特訓</h1>
    <span id="drill-progress"></span>
    <span class="pf-close" id="drill-close" title="閉じる">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </span>
  </div>
  <div id="drill-banner">🪸 練習モード — 記憶強度・定着の記録には影響しません</div>
  <div id="drill-body">
    <div id="drill-card-area">
      <div id="drill-card-wrapper">
        <!-- PC（タッチ非対応）用ナビボタン。no-touch 時のみ JS で表示 -->
        <div id="drill-nav-btns" hidden>
          <button id="drill-next-btn" title="次へ">↓</button>
        </div>
      </div>
    </div>
    <div id="drill-status" style="display:none"></div>
  </div>
</div>

<!-- Heatmap tooltip -->
<div id="heatmap-tooltip">
  <div class="tt-word" id="tt-word"></div>
  <div class="tt-info" id="tt-info"></div>
</div>

<!-- Wave complete overlay -->
<div class="overlay" id="overlay-wavecomplete" style="display:none">
  <div class="overlay-card wc-card">
    <div class="wc-icon"><span class="wave-icon"></span></div>
    <div class="overlay-title" id="wc-title"></div>
    <div class="wc-message" id="wc-message"></div>
    <button class="btn-primary" id="btn-wavecomplete-close">続ける</button>
  </div>
</div>

<!-- Session complete overlay (hidden by default) -->
<div class="overlay" id="overlay-complete" style="display:none">
  <div class="overlay-card">
    <div class="overlay-title" id="oc-title">セッション完了</div>
    <div class="oc-section">今回</div>
    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-label">学習したカード</div>
        <div class="stat-value"><span id="oc-done">0</span>/<span id="oc-total">0</span></div>
      </div>
      <div class="stat-box">
        <div class="stat-label">正解率</div>
        <div class="stat-value" id="oc-acc">–</div>
      </div>
    </div>
    <div class="oc-section">Word Wave</div>
    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-label">学習した単語</div>
        <div class="stat-value" id="oc-learned">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">定着した単語</div>
        <div class="stat-value" id="oc-mastered">0</div>
      </div>
    </div>
    <button class="btn-primary" id="btn-continue">このまま続ける</button>
    <div class="time-controls">
      <label>時間を進める（動作確認用）</label>
      <div class="time-btn-row">
        <button class="time-btn" id="btn-next-session">+8時間</button>
        <button class="time-btn" id="btn-next-day">+1日</button>
        <button class="time-btn" id="btn-next-week">+1週間</button>
      </div>
    </div>
  </div>
</div>


<script type="module" src="app.js"></script>
</body>
</html>
